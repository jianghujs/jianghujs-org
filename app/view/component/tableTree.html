<script type="text/x-template" id="table-tree">
    <v-expansion-panel
        v-for="(item,i) in tableData"
        :key="i"
    >
      <v-expansion-panel-header>
        {{ item.orgName }}
      </v-expansion-panel-header>
      <v-expansion-panel-content>
        <v-data-table 
            v-if="item.memberList"
            fixed-header
            hide-default-footer
            :headers="nodeHeaders"
            :items="item.memberList"
            :search="searchInput"
            mobile-breakpoint="0"
            :loading="isTableLoading"
            checkbox-color="success"
            class="elevation-0 mb-2 mb-xs-4 flex-fill d-flex flex-column">
            <template v-slot:item.action="{ item }">
              <v-btn small class=" success" @click="doUiAction('startUpdateItem', {item})">修改</v-btn>
              <v-btn small class=" error" @click="doUiAction('deleteItem', {item})">删除</v-btn>
            </template>
        </v-data-table>
        <v-expansion-panels>
          <table-tree 
            v-if="item.children"
            v-for="(child,childIndex) in item.children"
            :key="child.orgId"
            :table-data="[child]" 
            :nodeHeaders="nodeHeaders"
            :isTachildleLoading="isTableLoading"
          /></table-tree>
        </v-expansion-panels>
      </v-expansion-panel-content>
    </v-expansion-panel>
</script>

<script>
  Vue.component("table-tree", {
    template: "#table-tree",
    props: {
      tableData: {
        type: Object,
        default: {}
      },
      nodeHeaders: {
        type: Object,
        default: {}
      },
      isTableLoading: {
        type: Boolean,
        default: false
      }
    },
    watch: {
      tableData: {
        immediate: true,
        async handler(val) {
          console.log('tableData================', val)
        },
        deep: true
      }
    },
    data() {
      return {
        searchInput: null,
      };
    },
    mounted() {
   
    },
    methods: {

    }
  });
</script>
